<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Challenges - Birthday Challenge Zone</title>
    <link rel="icon" type="image/png" href="images/favicon.jpg" />
    <link rel="stylesheet" href="css/geocities.css" />
    <link rel="stylesheet" href="css/components/navigation.css" />
    <link rel="stylesheet" href="css/components/submissions.css" />
    <link rel="stylesheet" href="css/components/event-card.css" />
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth-compat.js"></script>
  </head>

  <body>
    <div class="container">
      <!-- Navigation Component -->
      <nav class="site-navigation mobile-menu-default">
        <button
          class="mobile-menu-toggle active"
          data-sound="menu"
          aria-label="Toggle navigation menu"
        >
          <span class="hamburger-icon">☰</span>
        </button>
        <div class="nav-user-info">
          <div class="user-welcome">
            <span data-nav="page-title">My Challenges</span>
            <img src="images/profile.gif" alt="profile" class="icon-gif user-profile-button" />
          </div>
        </div>
        <div class="nav-menu">
          <div class="nav-tabs">
            <a href="/dashboard" class="nav-tab" data-sound="menu" data-page="dashboard">
              <img
                src="images/home.gif"
                alt="home"
                class="icon-gif icon-gif--lg icon-gif--with-text"
              />
              <span>DASHBOARD</span>
            </a>
            <a href="/event-info" class="nav-tab" data-sound="menu" data-page="event-info">
              <img src="images/question.gif" alt="info" class="icon-gif icon-gif--with-text" />
              <span>EVENT INFO</span>
            </a>
            <a href="/leaderboard" class="nav-tab" data-sound="menu" data-page="leaderboard">
              <img src="images/trophy.gif" alt="trophy" class="icon-gif icon-gif--with-text" />
              <span>LEADERBOARD</span>
            </a>
          </div>
        </div>
      </nav>

      <main>
        <h1>Challenges</h1>

        <section class="section">
          <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 12px">
            <input
              id="challengeTargetInput"
              placeholder="Enter username or user id to challenge"
              style="flex: 1; padding: 8px"
            />
            <button id="challengeTargetBtn" class="btn btn-primary">Challenge</button>
          </div>

          <div id="challengesList">
            <div class="loading">Loading challenges...</div>
          </div>
        </section>
      </main>
    </div>

    <script type="module">
      import { initNavigation } from "/js/components/navigation.js";
      import { ChallengesPage } from "/js/pages/challenges.js";

      initNavigation();

      const page = new ChallengesPage();
      window.addEventListener("DOMContentLoaded", () => page.init());
    </script>

    <bottom-menu></bottom-menu>
    <script type="module" src="/js/components/bottom-menu.js"></script>
  </body>
</html>
